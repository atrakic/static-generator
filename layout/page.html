<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ title }} - {{ subtitle }}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ base_path }}/css/style.css">
</head>

<body id="{{ slug }}">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark border-bottom border-secondary-subtle">
        <div class="container">
            <a class="navbar-brand" href="{{ base_path }}/">Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-md-auto">
                    <a class="nav-link" href="{{ base_path }}/blog/">Blog</a>
                    <a class="nav-link" href="{{ base_path }}/news/">News</a>
                    <a class="nav-link" href="{{ base_path }}/contact/">Contact</a>
                    <a class="nav-link" href="{{ base_path }}/about/">About</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4 content-wrap">
        {{ content }}
    </main>

    <footer class="bg-light border-top mt-5 py-4 text-center">
        <div class="container">
            <p>&copy; {{ current_year }} {{ author }}</p>
            <p>
                <a href="{{ generator }}">{{ generator }}</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        (function () {
            var pathname = window.location.pathname || "/";
            var navLinks = document.querySelectorAll(".navbar .nav-link");

            navLinks.forEach(function (link) {
                var href = link.getAttribute("href") || "";
                if (!href) {
                    return;
                }

                if (pathname.indexOf(href) === 0) {
                    link.classList.add("active");
                    link.setAttribute("aria-current", "page");
                }
            });
        })();
    </script>
</body>
</html>
